# Dependabot configuration — supply-chain hardening (DEVELOPMENT_PLAN.md §6.1.7).
# Grouped minor/patch PRs to reduce toil; majors raised as separate PRs for review.
version: 2

updates:
  # Production and dev npm dependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      prefix-development: "chore"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Majors are intentionally excluded from grouping so they arrive as
      # separate, individually reviewable PRs.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions used in CI/release workflows (pinned to commit SHAs).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
