name: Publish to npm (manual)

# Escape hatch to publish an existing tag, e.g. when the release predates
# the NPM_TOKEN secret. Normal releases publish automatically via release.yml.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v1.0.0)'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run verification tests
        run: npm test

      # provenance and public access come from package.json publishConfig
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
